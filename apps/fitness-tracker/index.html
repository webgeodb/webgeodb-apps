<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGeoDB 教程 - 户外运动追踪器</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    #map {
      flex: 1;
      height: 100%;
    }

    .sidebar {
      width: 380px;
      background: white;
      padding: 20px;
      overflow-y: auto;
      box-shadow: -2px 0 10px rgba(0,0,0,0.1);
    }

    .sidebar h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sport-selector {
      margin-bottom: 20px;
    }

    .sport-selector label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #555;
    }

    .sport-selector select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .control-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .button-primary {
      background: #4CAF50;
      color: white;
    }

    .button-primary:hover {
      background: #45a049;
    }

    .button-danger {
      background: #f44336;
      color: white;
    }

    .button-danger:hover {
      background: #da190b;
    }

    .button-secondary {
      background: #2196F3;
      color: white;
    }

    .button-secondary:hover {
      background: #0b7dda;
    }

    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #333;
    }

    .stat-unit {
      font-size: 14px;
      color: #999;
      font-weight: 400;
    }

    .section {
      margin-bottom: 25px;
    }

    .section h2 {
      font-size: 16px;
      margin-bottom: 15px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .waypoints-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 10px;
    }

    .waypoint-item {
      padding: 8px;
      margin-bottom: 8px;
      background: #f8f9fa;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .waypoint-item:hover {
      background: #e3f2fd;
    }

    .waypoint-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .waypoint-coords {
      font-size: 12px;
      color: #666;
    }

    .waypoint-actions {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }

    .waypoint-btn {
      padding: 4px 8px;
      font-size: 11px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      background: #2196F3;
      color: white;
    }

    .waypoint-btn.delete {
      background: #f44336;
    }

    .chart-container {
      height: 200px;
      margin-bottom: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      padding: 10px;
    }

    .workout-list {
      max-height: 250px;
      overflow-y: auto;
    }

    .workout-item {
      padding: 12px;
      margin-bottom: 10px;
      background: #f8f9fa;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .workout-item:hover {
      background: #e3f2fd;
      transform: translateX(5px);
    }

    .workout-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .workout-name {
      font-weight: 600;
      color: #333;
    }

    .workout-type {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 12px;
      background: #2196F3;
      color: white;
    }

    .workout-stats {
      display: flex;
      gap: 15px;
      font-size: 13px;
      color: #666;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      color: #555;
      font-size: 13px;
    }

    .input-group input {
      width: 100%;
      padding: 8px;
      border: 2px solid #e0e0e0;
      border-radius: 4px;
      font-size: 13px;
    }

    .input-group input:focus {
      outline: none;
      border-color: #2196F3;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .status-badge.active {
      background: #4CAF50;
      color: white;
    }

    .status-badge.inactive {
      background: #f44336;
      color: white;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="map"></div>

    <div class="sidebar">
      <h1>
        🏃 户外运动追踪器
      </h1>

      <div id="statusBadge" class="status-badge inactive">未开始</div>

      <div class="sport-selector">
        <label for="sportType">运动类型</label>
        <select id="sportType">
          <option value="running">🏃 跑步</option>
          <option value="cycling">🚴 骑行</option>
          <option value="hiking">🥾 徒步</option>
          <option value="walking">🚶 散步</option>
          <option value="skiing">⛷️ 滑雪</option>
        </select>
      </div>

      <div class="control-buttons">
        <button id="startBtn" class="button button-primary">开始</button>
        <button id="pauseBtn" class="button button-secondary" disabled>暂停</button>
        <button id="stopBtn" class="button button-danger" disabled>停止</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">距离</div>
          <div class="stat-value" id="distance">0.00</div>
          <div class="stat-unit">公里</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">时间</div>
          <div class="stat-value" id="duration">0:00:00</div>
          <div class="stat-unit"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">速度</div>
          <div class="stat-value" id="speed">0.0</div>
          <div class="stat-unit">公里/小时</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">消耗</div>
          <div class="stat-value" id="calories">0</div>
          <div class="stat-unit">千卡</div>
        </div>
      </div>

      <div class="section">
        <h2>📍 航点标记</h2>
        <div class="input-group">
          <label for="waypointName">航点名称</label>
          <input type="text" id="waypointName" placeholder="输入航点名称...">
        </div>
        <button id="addWaypointBtn" class="button button-secondary" style="width: 100%; margin-bottom: 10px;">
          添加当前位置
        </button>
        <div class="waypoints-list" id="waypointsList">
          <div style="text-align: center; color: #999; padding: 20px;">
            暂无航点
          </div>
        </div>
      </div>

      <div class="section">
        <h2>📊 速度曲线</h2>
        <div class="chart-container">
          <canvas id="speedChart"></canvas>
        </div>
      </div>

      <div class="section">
        <h2>📝 历史记录</h2>
        <div class="workout-list" id="workoutList">
          <div style="text-align: center; color: #999; padding: 20px;">
            暂无运动记录
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
